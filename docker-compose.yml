services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - app_network
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/books-web/Dockerfile
    networks:
      - app_network
    ports:
      - "80:80"

    depends_on:
      - backend

networks:
  app_network:
    driver: bridge
